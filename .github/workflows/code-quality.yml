name: Code Quality

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  code-analysis:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore dependencies
      run: dotnet restore

    - name: Install analyzers
      run: |
        dotnet add package Microsoft.CodeAnalysis.NetAnalyzers -v 10.0.0
        dotnet add package SonarAnalyzer.CSharp -v 9.18.0.82949

    - name: Code analysis
      run: |
        dotnet build --configuration Release --no-restore /p:EnforceCodeStyleInBuild=true

    - name: Check formatting
      run: |
        dotnet format --verify-no-changes --verbosity diagnostic || true

    - name: SonarCloud Scan
      uses: SonarSource/sonarcloud-github-action@master
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      with:
        args: >
          -Dsonar.projectKey=finsight-ai
          -Dsonar.organization=your-org

  dependency-check:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Run OWASP Dependency-Check
      uses: dependency-check/Dependency-Check_Action@main
      with:
        project: 'FinSight'
        path: '.'
        format: 'JSON'

    - name: Upload results
      uses: actions/upload-artifact@v3
      with:
        name: dependency-check-report
        path: reports/
